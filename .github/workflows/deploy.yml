name: CI/CD WordPress K8s BJM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bakajrmb-prog/wordpress-bjm

jobs:
  validate:
    name: Validation manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        run: |
          curl -LO https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - name: Validate K8s manifests
        run: kubectl apply --dry-run=client -f kubernetes/

  build:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Deploy MySQL
        run: |
          kubectl apply -f kubernetes/secret-configmap.yml
          kubectl apply -f kubernetes/pv-pvc.yml
          kubectl apply -f kubernetes/mysql-deployment.yml
          kubectl rollout status deployment/mysql -n mon-project-magui-bjm --timeout=120s
      - name: Deploy WordPress
        run: |
          kubectl apply -f kubernetes/wordpress-deployment.yml
          kubectl rollout status deployment/wordpress -n mon-project-magui-bjm --timeout=120s
      - name: Verify
        run: |
          kubectl get pods -n mon-project-magui-bjm
          kubectl get svc -n mon-project-magui-bjm
